name: Docker

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - full
          - mini
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generate tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            if [ "${{ matrix.profile }}" = "mini" ]; then
              echo "ghcr.io/hrntknr/sh:mini"
              echo "ghcr.io/hrntknr/sh:mini-${{ github.sha }}"
            else
              echo "ghcr.io/hrntknr/sh:full"
              echo "ghcr.io/hrntknr/sh:full-${{ github.sha }}"
              echo "ghcr.io/hrntknr/sh:latest"
              echo "ghcr.io/hrntknr/sh:${{ github.sha }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            DOTFILES_PROFILE=${{ matrix.profile }}
          tags: ${{ steps.tags.outputs.tags }}
          secrets: |
            github_token=${{ github.token }}
