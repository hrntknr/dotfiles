[terminal]
#new_cwd = "home"

[keys]
prefix = "ctrl+s"
split_vertical = "prefix+%"
split_horizontal = "prefix+\""
focus_pane_left = "prefix+left"
focus_pane_down = "prefix+down"
focus_pane_up = "prefix+up"
focus_pane_right = "prefix+right"
previous_workspace = "prefix+shift+left"
next_workspace = "prefix+shift+right"
reload_config = "prefix+r"

[ui]
mouse_capture = true
prompt_new_tab_name = false
pane_borders = true
pane_gaps = false

[ui.sound]
enabled = false

[advanced]
scrollback_limit_bytes = 10485760
