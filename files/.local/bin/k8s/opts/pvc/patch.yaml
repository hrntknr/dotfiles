apiVersion: ${API_VERSION}
kind: ${KIND}
metadata:
  name: ${NAME}
spec:
  template:
    spec:
      containers:
        - name: ${PRIMARY_CONTAINER}
          volumeMounts:
            - mountPath: /root/work
              name: work
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: ${PVC_NAME}
