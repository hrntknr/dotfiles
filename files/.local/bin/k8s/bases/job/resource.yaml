apiVersion: ${API_VERSION}
kind: ${KIND}
metadata:
  name: ${NAME}
spec:
  ttlSecondsAfterFinished: 3600
  completions: 1
  parallelism: 1
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ${NAME}
    spec:
      restartPolicy: Never
      containers:
        - name: ${PRIMARY_CONTAINER}
          image: busybox:stable
          imagePullPolicy: Always
          command:
            - sleep
            - "10"
